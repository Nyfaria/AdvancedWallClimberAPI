name: Publish to GitHub Packages

on:
  push:
    paths:
      - 'gradle.properties'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish even if version unchanged'
        required: false
        default: false
        type: boolean

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          # Get current version
          CURRENT_VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          # For releases, manual triggers with force, always publish
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "Publishing due to release"
            exit 0
          fi
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_publish }}" = "true" ]; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
              echo "Publishing due to forced manual trigger"
              exit 0
            fi
          fi
          
          # For pushes, check if version changed
          git show HEAD~1:gradle.properties > /tmp/old_gradle.properties 2>/dev/null || {
            echo "No previous version found, assuming first commit"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            exit 0
          }
          
          OLD_VERSION=$(grep '^version=' /tmp/old_gradle.properties | cut -d'=' -f2)
          echo "Previous version: $OLD_VERSION"
          
          if [ "$CURRENT_VERSION" != "$OLD_VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build --no-daemon

      - name: Publish Common to GitHub Packages
        run: ./gradlew :common:publishAwcapiPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish Fabric to GitHub Packages
        run: ./gradlew :fabric:publishAwcapiPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish NeoForge to GitHub Packages
        run: ./gradlew :neoforge:publishAwcapiPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish Fabric Mod (CurseForge/Modrinth)
        run: ./gradlew :fabric:publishMods --no-daemon
        env:
          curseforge_token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
          spider_news: ${{ secrets.DISCORD_WEBHOOK }}
        continue-on-error: true

      - name: Publish NeoForge Mod (CurseForge/Modrinth)
        run: ./gradlew :neoforge:publishMods --no-daemon
        env:
          curseforge_token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
          spider_news: ${{ secrets.DISCORD_WEBHOOK }}
        continue-on-error: true

      - name: Create summary
        run: |
          echo "## Published Version ${{ needs.check-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "Successfully published the following artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- \`com.nyfaria.awcapi:awcapi-common:${{ needs.check-version.outputs.version }}+1.21.1\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`com.nyfaria.awcapi:awcapi-fabric:${{ needs.check-version.outputs.version }}+1.21.1\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`com.nyfaria.awcapi:awcapi-neoforge:${{ needs.check-version.outputs.version }}+1.21.1\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mod Platforms" >> $GITHUB_STEP_SUMMARY
          echo "Attempted to publish to CurseForge and Modrinth (if enabled in gradle.properties)" >> $GITHUB_STEP_SUMMARY

